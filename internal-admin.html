<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👑 New Gates PMS - Super Admin</title>
  
  <!-- Load Scripts dengan Urutan Benar -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #1E293B; }
    .card { @apply bg-white rounded-xl border border-gray-200 shadow-sm; }
    .btn { @apply px-4 py-2 rounded-lg font-medium transition text-sm flex items-center gap-2 disabled:opacity-50; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
    .btn-outline { @apply border border-gray-300 text-gray-700 hover:bg-gray-50; }
    input, select { @apply w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500; }
    label { @apply block text-xs font-semibold text-gray-500 mb-1 uppercase; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ⚙️ CONFIG - Pastikan URL & Key diisi
    const SUPABASE_URL = 'https://eybscqqkusgbfmvvjbbb.supabase.co'; // GANTI DENGAN URL ANDA
    const SUPABASE_ANON_KEY = 'sb_publishable_fAvutkgsk5UAXnwIz5RSPw_Z2Dk43EP'; // GANTI DENGAN KEY ANDA
    
    // Inisialisasi Supabase Client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, createContext, useContext } = React;

    const AppContext = createContext();

    // 🏠 LOGIN PAGE
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');

        try {
          const {  auth, error: err } = await supabase.auth.signInWithPassword({ 
            email, 
            password 
          });
          
          if (err) throw err;
          if (auth.user.app_metadata?.role !== 'super_admin') {
            throw new Error('Access Denied: Super Admin only');
          }
          
          onLogin(auth);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-blue-50">
          <div className="card w-full max-w-md p-8">
            <div className="text-center mb-6">
              <h1 className="text-2xl font-bold text-blue-700">👑 New Gates PMS</h1>
              <p className="text-gray-500 text-sm mt-1">SaaS Super Admin Console</p>
            </div>
            
            {error && (
              <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm border border-red-100">
                {error}
              </div>
            )}
            
            <form onSubmit={handleLogin} className="space-y-4">
              <div>
                <label>Email</label>
                <input 
                  type="email" 
                  value={email} 
                  onChange={e => setEmail(e.target.value)} 
                  placeholder="saas@admin.com"
                  required 
                />
              </div>
              <div>
                <label>Password</label>
                <input 
                  type="password" 
                  value={password} 
                  onChange={e => setPassword(e.target.value)} 
                  placeholder="••••••••"
                  required 
                />
              </div>
              <button 
                type="submit" 
                disabled={loading} 
                className="btn btn-primary w-full"
              >
                {loading ? 'Verifying...' : 'Masuk Panel Utama'}
              </button>
            </form>
            
            <p className="text-xs text-center text-gray-400 mt-6">
              Demo: saas@admin.com / AdminSaaS123!
            </p>
          </div>
        </div>
      );
    }

    // 📊 DASHBOARD (Simple)
    function Dashboard() {
      const [stats, setStats] = useState({ tenants: 0, revenue: 0 });

      useEffect(() => {
        // Load stats dari Supabase
        (async () => {
          const {  count } = await supabase.from('tenants').select('*', { count: 'exact', head: true });
          setStats({ tenants: count || 0, revenue: 0 });
        })();
      }, []);

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-800">Dashboard</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="card p-5">
              <p className="text-xs font-semibold text-gray-500 uppercase">Total Tenants</p>
              <p className="text-2xl font-bold mt-1 text-blue-600">{stats.tenants}</p>
            </div>
            <div className="card p-5">
              <p className="text-xs font-semibold text-gray-500 uppercase">Active Subscriptions</p>
              <p className="text-2xl font-bold mt-1 text-green-600">0</p>
            </div>
            <div className="card p-5">
              <p className="text-xs font-semibold text-gray-500 uppercase">System Status</p>
              <p className="text-2xl font-bold mt-1 text-emerald-600">Online</p>
            </div>
          </div>
        </div>
      );
    }

    // 🚀 MAIN APP
    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Check session saat mount
        supabase.auth.getSession().then(({  { session: s } }) => {
          if (s?.user?.app_metadata?.role === 'super_admin') {
            setSession(s);
          }
          setLoading(false);
        });

        // Listen auth changes
        const {  { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
          if (s?.user?.app_metadata?.role === 'super_admin') {
            setSession(s);
          } else {
            setSession(null);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      const handleLogout = () => {
        supabase.auth.signOut().then(() => setSession(null));
      };

      if (loading) {
        return (
          <div className="flex h-screen items-center justify-center bg-gray-50">
            <div className="text-center">
              <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
              <p className="text-gray-600">Loading Admin Console...</p>
            </div>
          </div>
        );
      }

      if (!session) {
        return <LoginPage onLogin={s => setSession(s)} />;
      }

      return (
        <AppContext.Provider value={{ session }}>
          <div className="min-h-screen">
            <header className="bg-white border-b p-4 flex justify-between items-center">
              <h1 className="text-xl font-bold text-blue-700">👑 New Gates Super Admin</h1>
              <button onClick={handleLogout} className="btn btn-outline">Logout</button>
            </header>
            <main className="p-6">
              <Dashboard />
            </main>
          </div>
        </AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
