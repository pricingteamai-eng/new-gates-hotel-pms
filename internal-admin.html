<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👑 New Gates PMS - Super Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    .card { @apply bg-white rounded-xl border border-gray-200 shadow-sm p-6; }
    .btn { @apply px-4 py-2 rounded-lg font-medium text-sm; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
    input { @apply w-full border border-gray-300 rounded-lg p-2.5 text-sm; }
    label { @apply block text-xs font-semibold text-gray-500 mb-1 uppercase; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://eybscqqkusgbfmvvjbbb.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fAvutkgsk5UAXnwIz5RSPw_Z2Dk43EP';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect } = React;

    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const result = await supabase.auth.signInWithPassword({ email, password });
          if (result.error) throw result.error;
          if (result.data.user.app_metadata?.role !== 'super_admin') {
            throw new Error('Access Denied: Super Admin only');
          }
          onLogin(result.data.session);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="card w-full max-w-md">
            <h1 className="text-2xl font-bold text-center text-blue-700 mb-2">👑 New Gates PMS</h1>
            <p className="text-center text-gray-500 mb-6">SaaS Super Admin</p>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">{error}</div>}
            <form onSubmit={handleLogin} className="space-y-4">
              <div><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
              <div><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
              <button type="submit" disabled={loading} className="btn btn-primary w-full">{loading ? 'Loading...' : 'Masuk'}</button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // FIXED: Proper destructuring with data:
        supabase.auth.getSession().then(({  { session: s } }) => {
          if (s?.user?.app_metadata?.role === 'super_admin') {
            setSession(s);
          }
          setLoading(false);
        });

        const {  { subscription } } = supabase.auth.onAuthStateChange((event, { session: s }) => {
          if (s?.user?.app_metadata?.role === 'super_admin') {
            setSession(s);
          } else {
            setSession(null);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      if (loading) return <div className="flex h-screen items-center justify-center">Loading...</div>;
      if (!session) return <LoginPage onLogin={setSession} />;

      return (
        <div className="min-h-screen">
          <header className="bg-white border-b p-4 flex justify-between">
            <h1 className="text-xl font-bold text-blue-700">👑 Super Admin</h1>
            <button onClick={() => supabase.auth.signOut().then(() => setSession(null))} className="btn">Logout</button>
          </header>
          <main className="p-6">
            <div className="card">
              <h2 className="text-xl font-bold mb-4">Dashboard</h2>
              <p className="text-gray-600">Welcome, {session.user.email}</p>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
