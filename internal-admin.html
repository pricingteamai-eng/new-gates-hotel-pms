<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👑 New Gates PMS - Super Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #1E293B; }
    .card { @apply bg-white rounded-xl border border-gray-200 shadow-sm; }
    .btn { @apply px-4 py-2 rounded-lg font-medium transition text-sm flex items-center gap-2 disabled:opacity-50; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
    .btn-outline { @apply border border-gray-300 text-gray-700 hover:bg-gray-50; }
    .btn-danger { @apply bg-red-50 text-red-600 hover:bg-red-100; }
    input, select, textarea { @apply w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white; }
    label { @apply block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide; }
    .badge { @apply px-2 py-1 rounded-full text-xs font-semibold; }
    .badge-green { @apply bg-green-100 text-green-800; }
    .badge-blue { @apply bg-blue-100 text-blue-800; }
    .badge-yellow { @apply bg-yellow-100 text-yellow-800; }
    .badge-gray { @apply bg-gray-100 text-gray-800; }
    table { @apply w-full text-left border-collapse; }
    th { @apply bg-gray-50 text-gray-600 font-semibold text-xs uppercase p-3 border-b; }
    td { @apply p-3 border-b text-sm text-gray-700; }
    tr:hover { @apply bg-gray-50; }
    .sidebar-item { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition cursor-pointer; }
    .sidebar-item:hover { @apply bg-blue-50 text-blue-700; }
    .sidebar-item.active { @apply bg-blue-600 text-white shadow-md; }
    .modal-overlay { @apply fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4; }
    .modal-content { @apply bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ⚙️ CONFIG
    const SUPABASE_URL = 'https://eybscqqkusgbfmvvjbbb.supabase.co'; // GANTI URL
    const SUPABASE_ANON_KEY = 'sb_publishable_fAvutkgsk5UAXnwIz5RSPw_Z2Dk43EP'; // GANTI KEY
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useMemo, createContext, useContext } = React;

    const AppContext = createContext();
    const formatCurrency = v => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v || 0);
    const formatDate = d => d ? new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';

    // 🏠 LOGIN
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = async e => {
        e.preventDefault(); setLoading(true); setError('');
        try {
          const { data, error: err } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (err) throw err;
          const { data: prof, error: profErr } = await supabaseClient.from('profiles').select('role').eq('id', data.user.id).single();
          if (profErr || prof.role !== 'super_admin') throw new Error('Access Denied: Super Admin only.');
          onLogin(data);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-blue-50">
          <div className="card w-full max-w-md p-8">
            <div className="text-center mb-6">
              <h1 className="text-2xl font-bold text-blue-700">👑 New Gates PMS</h1>
              <p className="text-gray-500 text-sm mt-1">SaaS Super Admin Console</p>
            </div>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm border border-red-100">{error}</div>}
            <form onSubmit={handleLogin} className="space-y-4">
              <div><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
              <div><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
              <button type="submit" disabled={loading} className="btn btn-primary w-full">{loading ? 'Verifying...' : 'Masuk Panel Utama'}</button>
            </form>
            <p className="text-xs text-center text-gray-400 mt-6">Demo: saas@admin.com / AdminSaaS123!</p>
          </div>
        </div>
      );
    }

    // 📊 DASHBOARD
    function Dashboard() {
      const [tenants, setTenants] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        (async () => {
          const { data: t } = await supabaseClient.from('tenants').select('*');
          const { data: b } = await supabaseClient.from('reservations').select('guest_name, check_in, check_out, status, total_amount, tenant:tenants(name)').limit(10).order('created_at', { ascending: false });
          setTenants(t || []);
          setBookings(b || []);
          setLoading(false);
        })();
      }, []);

      const stats = useMemo(() => ({
        total: tenants.length,
        active: tenants.filter(t => t.is_active).length,
        mrr: tenants.reduce((sum, t) => sum + (t.plan === 'enterprise' ? 2500000 : t.plan === 'pro' ? 899000 : 299000), 0),
        todayRev: bookings.filter(b => b.check_in === new Date().toISOString().split('T')[0]).reduce((s, b) => s + (b.total_amount || 0), 0)
      }), [tenants, bookings]);

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div className="card p-5"><p className="text-xs font-semibold text-gray-500 uppercase">Total Tenants</p><p className="text-2xl font-bold mt-1">{stats.total}</p></div>
            <div className="card p-5"><p className="text-xs font-semibold text-gray-500 uppercase">Active Subscriptions</p><p className="text-2xl font-bold text-green-600 mt-1">{stats.active}</p></div>
            <div className="card p-5"><p className="text-xs font-semibold text-gray-500 uppercase">MRR (Est.)</p><p className="text-2xl font-bold text-blue-600 mt-1">{formatCurrency(stats.mrr)}</p></div>
            <div className="card p-5"><p className="text-xs font-semibold text-gray-500 uppercase">Forecast Today</p><p className="text-2xl font-bold text-purple-600 mt-1">{formatCurrency(stats.todayRev)}</p></div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 card p-5">
              <h3 className="font-bold text-gray-800 mb-4">Last 30 Days Revenue</h3>
              <div className="h-48 bg-gray-50 rounded-lg flex items-center justify-center text-gray-400 text-sm">
                📊 Chart Component (Integrate Recharts/Chart.js here)
              </div>
              <div className="flex gap-2 mt-4">
                <button className="btn btn-outline text-xs">Last 30 Days</button>
                <select className="w-auto text-xs border rounded px-2 py-1"><option>This Month</option><option>Last Month</option></select>
              </div>
            </div>

            <div className="card p-5">
              <div className="flex justify-between items-center mb-4">
                <h3 className="font-bold text-gray-800">Recent Bookings</h3>
                <button className="text-xs text-blue-600 font-semibold">See All</button>
              </div>
              <div className="space-y-3 max-h-64 overflow-y-auto">
                {loading ? <p className="text-gray-400 text-sm">Loading...</p> : bookings.map((b, i) => (
                  <div key={i} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div>
                      <p className="font-medium text-sm">{b.guest_name}</p>
                      <p className="text-xs text-gray-500">{b.tenant?.name || 'Unknown Hotel'}</p>
                    </div>
                    <span className={`badge ${b.status === 'checked_in' ? 'badge-green' : 'badge-blue'}`}>{b.status}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="card p-5">
            <h3 className="font-bold text-gray-800 mb-4">Channel Manager Status</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {['Traveloka', 'Agoda', 'Booking.com', 'Tiket.com'].map(ota => (
                <div key={ota} className="flex items-center justify-between p-3 border border-gray-200 rounded-lg">
                  <span className="font-medium text-sm">{ota}</span>
                  <span className="badge badge-green">Connected</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // 🏢 TENANT MANAGEMENT
    function TenantManagement() {
      const [tenants, setTenants] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ name: '', plan: 'starter', contact: '', status: 'active' });

      useEffect(() => {
        supabaseClient.from('tenants').select('*').order('created_at', { ascending: false }).then(({ data }) => setTenants(data || []));
      }, []);

      const handleSubmit = async e => {
        e.preventDefault();
        const { error } = await supabaseClient.from('tenants').insert([form]);
        if (!error) { setShowForm(false); setForm({ name: '', plan: 'starter', contact: '', status: 'active' }); }
      };

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-xl font-bold text-gray-800">Manajemen Klien (Tenants)</h2>
            <button onClick={() => setShowForm(true)} className="btn btn-primary">+ Klien Baru</button>
          </div>

          <div className="card overflow-hidden">
            <table>
              <thead><tr><th>Nama Klien</th><th>Plan</th><th>Kontak</th><th>Status</th><th>Masa Aktif</th><th>Aksi</th></tr></thead>
              <tbody>
                {tenants.map(t => (
                  <tr key={t.id}>
                    <td className="font-medium">{t.name}</td>
                    <td><span className="badge badge-blue">{t.plan}</span></td>
                    <td>{t.contact || '-'}</td>
                    <td><span className={`badge ${t.is_active ? 'badge-green' : 'badge-gray'}`}>{t.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>{formatDate(t.created_at)}</td>
                    <td className="flex gap-2">
                      <button className="text-blue-600 hover:underline text-xs">Edit</button>
                      <button className="text-red-600 hover:underline text-xs">Suspend</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showForm && (
            <div className="modal-overlay" onClick={() => setShowForm(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-bold mb-4">Registrasi Klien Baru</h3>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div><label>Nama Organisasi</label><input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required /></div>
                    <div><label>Client Code</label><input value={form.contact} onChange={e=>setForm({...form, contact:e.target.value})} placeholder="Custom Code" /></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label>Paket SaaS</label><select value={form.plan} onChange={e=>setForm({...form, plan:e.target.value})}><option value="starter">Starter</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select></div>
                    <div><label>Status</label><select value={form.status} onChange={e=>setForm({...form, status:e.target.value})}><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" onClick={() => setShowForm(false)} className="btn btn-outline">Batal</button>
                    <button type="submit" className="btn btn-primary">Buat Klien</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 👥 USER CONFIGURATION
    function UserConfiguration() {
      const [activeTab, setActiveTab] = useState('roles');
      const [profiles, setProfiles] = useState([]);
      const [tenants, setTenants] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (activeTab === 'userroles') {
          setLoading(true);
          Promise.all([
            supabaseClient.from('profiles').select('*, tenant:tenants(name)'),
            supabaseClient.from('tenants').select('id, name')
          ]).then(([p, t]) => {
            setProfiles(p.data || []);
            setTenants(t.data || []);
            setLoading(false);
          });
        }
      }, [activeTab]);

      const updateUserRole = async (userId, role) => {
        const { error } = await supabaseClient.from('profiles').update({ role }).eq('id', userId);
        if (!error) setProfiles(p => p.map(u => u.id === userId ? { ...u, role } : u));
      };

      const tabs = [
        { id: 'roles', label: 'Role Management' },
        { id: 'userroles', label: 'User Role Assignment' },
        { id: 'modules', label: 'Module Configuration' },
      ];

      return (
        <div className="space-y-4">
          <h2 className="text-xl font-bold text-gray-800">User Configuration</h2>
          <div className="flex border-b gap-2">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} className={`px-4 py-2 text-sm font-medium border-b-2 ${activeTab === t.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>{t.label}</button>
            ))}
          </div>
          <div className="card p-5">
            {activeTab === 'roles' && (
              <div>
                <div className="flex justify-between mb-4"><h3 className="font-semibold">Role List</h3><button className="btn btn-primary text-xs">+ Create Role</button></div>
                <table><thead><tr><th>Role Name</th><th>Permissions</th><th>Scope</th><th>Status</th></tr></thead>
                <tbody>
                  <tr><td className="font-medium">super_admin</td><td><span className="badge badge-blue">Full Access</span></td><td>Platform</td><td><span className="badge badge-green">Active</span></td></tr>
                  <tr><td className="font-medium">hotel_admin</td><td><span className="badge badge-blue">Hotel Full</span></td><td>Tenant</td><td><span className="badge badge-green">Active</span></td></tr>
                  <tr><td className="font-medium">receptionist</td><td><span className="badge badge-yellow">Front Office</span></td><td>Tenant</td><td><span className="badge badge-green">Active</span></td></tr>
                </tbody></table>
              </div>
            )}
            {activeTab === 'userroles' && (
              <div className="overflow-x-auto">
                {loading ? <p>Loading...</p> : (
                  <table><thead><tr><th>User Email</th><th>Hotel/Tenant</th><th>Current Role</th><th>Action</th></tr></thead>
                  <tbody>
                    {profiles.map(p => (
                      <tr key={p.id}>
                        <td>{p.id.slice(0,8)}... (User ID)</td>
                        <td>{p.tenant?.name || 'Platform'}</td>
                        <td><span className="badge badge-blue">{p.role}</span></td>
                        <td>
                          <select value={p.role} onChange={e=>updateUserRole(p.id, e.target.value)} className="text-xs p-1 border rounded">
                            <option value="super_admin">super_admin</option>
                            <option value="hotel_admin">hotel_admin</option>
                            <option value="receptionist">receptionist</option>
                            <option value="manager">manager</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody></table>
                )}
              </div>
            )}
            {activeTab === 'modules' && (
              <div className="space-y-4">
                <h3 className="font-semibold">Module Configuration per Tenant</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {tenants.slice(0,4).map(t => (
                    <div key={t.id} className="p-4 border rounded-lg flex justify-between items-center">
                      <span>{t.name}</span>
                      <div className="flex gap-2">
                        <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">PMS</span>
                        <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">POS</span>
                        <button className="text-xs text-blue-600">Edit</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // 💳 SUBSCRIPTION CONFIG
    function SubscriptionConfig() {
      const [activeTab, setActiveTab] = useState('plans');
      const [plans, setPlans] = useState([]);
      const [payments, setPayments] = useState([]);

      useEffect(() => {
        supabaseClient.from('saas_plans').select('*').then(({data})=>setPlans(data||[]));
        supabaseClient.from('saas_payments').select('*, tenant:tenants(name)').then(({data})=>setPayments(data||[]));
      }, [activeTab]);

      const defaultPlans = [
        { name: 'Starter', price: 299000, rooms: 20, features: 'Basic Front Office' },
        { name: 'Pro', price: 899000, rooms: 100, features: 'Full PMS + F&B POS' },
        { name: 'Enterprise', price: 2500000, rooms: 'Unlimited', features: 'All Modules + API' }
      ];

      return (
        <div className="space-y-4">
          <h2 className="text-xl font-bold text-gray-800">Subscription Configuration</h2>
          <div className="flex border-b gap-2">
            {['plans', 'payments'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 text-sm font-medium border-b-2 capitalize ${activeTab === t ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>{t} Management</button>
            ))}
          </div>
          <div className="card p-5">
            {activeTab === 'plans' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {(plans.length ? plans : defaultPlans).map((p, i) => (
                  <div key={i} className="border border-gray-200 rounded-lg p-4 flex flex-col">
                    <h3 className="font-bold text-lg">{p.name}</h3>
                    <p className="text-2xl font-bold text-blue-600 my-2">{formatCurrency(p.price)}<span className="text-sm text-gray-500 font-normal">/month</span></p>
                    <p className="text-sm text-gray-600 mb-4">{p.features}</p>
                    <div className="mt-auto flex gap-2">
                      <button className="btn btn-outline flex-1 text-xs">Edit</button>
                      <button className="btn btn-danger flex-1 text-xs">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {activeTab === 'payments' && (
              <div className="overflow-x-auto">
                <table><thead><tr><th>Date</th><th>Tenant</th><th>Plan</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  {payments.map(p => (
                    <tr key={p.id}>
                      <td>{formatDate(p.created_at)}</td>
                      <td>{p.tenant?.name}</td>
                      <td>{p.plan_name}</td>
                      <td className="font-bold">{formatCurrency(p.amount)}</td>
                      <td><span className={`badge ${p.status==='paid'?'badge-green':'badge-yellow'}`}>{p.status}</span></td>
                    </tr>
                  ))}
                  {payments.length===0 && <tr><td colSpan="5" className="text-center py-8 text-gray-400">No payment records found.</td></tr>}
                </tbody></table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // 📈 REPORTS & LOGS
    function ReportsAndLogs() {
      const [activeTab, setActiveTab] = useState('logs');
      const [logs, setLogs] = useState([]);
      const [sales, setSales] = useState([]);

      useEffect(() => {
        if (activeTab === 'logs') supabaseClient.from('audit_logs').select('*, tenant:tenants(name)').limit(50).order('created_at', {ascending:false}).then(({data})=>setLogs(data||[]));
        if (activeTab === 'sales') supabaseClient.from('sales').select('*, tenant:tenants(name)').limit(50).order('created_at', {ascending:false}).then(({data})=>setSales(data||[]));
      }, [activeTab]);
      
      return (
        <div className="space-y-4">
          <h2 className="text-xl font-bold text-gray-800">Reports & Audit Logs</h2>
          <div className="flex border-b gap-2 flex-wrap">
            {['logs', 'sales', 'subscription'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 text-sm font-medium border-b-2 capitalize ${activeTab === t ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>{t} Report</button>
            ))}
          </div>
          <div className="card p-5">
            {activeTab === 'logs' && (
              <div className="overflow-x-auto">
                <table><thead><tr><th>Timestamp</th><th>Klien</th><th>Aktor</th><th>Aksi</th><th>Detail</th></tr></thead>
                <tbody>
                  {logs.map(l => (
                    <tr key={l.id}>
                      <td>{formatDate(l.created_at)}</td>
                      <td>{l.tenant?.name}</td>
                      <td>{l.actor_email}</td>
                      <td><span className="badge badge-blue">{l.action}</span></td>
                      <td>{l.details}</td>
                    </tr>
                  ))}
                  {logs.length===0 && <tr><td colSpan="5" className="text-center py-8 text-gray-400">No logs found.</td></tr>}
                </tbody></table>
              </div>
            )}
            {activeTab === 'sales' && (
              <div className="overflow-x-auto">
                <table><thead><tr><th>Date</th><th>Tenant</th><th>Total Amount</th><th>Items</th></tr></thead>
                <tbody>
                  {sales.map(s => (
                    <tr key={s.id}>
                      <td>{formatDate(s.created_at)}</td>
                      <td>{s.tenant?.name}</td>
                      <td className="font-bold">{formatCurrency(s.total_amount)}</td>
                      <td>{s.items?.length} items</td>
                    </tr>
                  ))}
                </tbody></table>
              </div>
            )}
            {activeTab === 'subscription' && <div className="text-center py-8 text-gray-500">Subscription growth report coming soon.</div>}
          </div>
        </div>
      );
    }

    // 🧭 LAYOUT
    function Layout({ children, onLogout }) {
      const { setView, view } = useContext(AppContext);
      const menu = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'tenants', label: 'Manajemen Klien', icon: '🏢' },
        { id: 'users', label: 'User Configuration', icon: '👥' },
        { id: 'subscription', label: 'Subscription & Billing', icon: '💳' },
        { id: 'reports', label: 'Reports & Logs', icon: '📈' },
        { id: 'settings', label: 'System Settings', icon: '⚙️' }
      ];

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          <aside className="hidden md:flex flex-col w-64 bg-slate-900 text-white min-h-screen sticky top-0">
            <div className="p-6 border-b border-slate-700">
              <h1 className="text-xl font-bold text-blue-400">👑 New Gates</h1>
              <p className="text-xs text-slate-400 mt-1">SaaS Super Admin</p>
            </div>
            <nav className="flex-1 p-4 space-y-1">
              {menu.map(m => (
                <button key={m.id} onClick={() => setView(m.id)} className={`sidebar-item w-full ${view === m.id ? 'active' : 'text-slate-300'}`}>
                  <span className="text-lg">{m.icon}</span> {m.label}
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-slate-700">
              <button onClick={onLogout} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-red-400 hover:bg-slate-800">
                🚪 Keluar Sistem
              </button>
            </div>
          </aside>

          <main className="flex-1 p-4 md:p-8 overflow-y-auto pb-20 md:pb-8">
            {children}
          </main>

          <nav className="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around p-3 z-10">
            {menu.slice(0, 4).map(m => (
              <button key={m.id} onClick={() => setView(m.id)} className="flex flex-col items-center text-xs text-gray-600">
                <span className="text-xl mb-1">{m.icon}</span> {m.label.split(' ')[0]}
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // 🚀 APP
    function App() {
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [view, setView] = useState('dashboard');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session: s } }) => {
          if (s) loadUser(s);
          else setLoading(false);
        });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_, s) => s ? loadUser(s) : (setSession(null), setProfile(null)));
        return () => subscription.unsubscribe();
      }, []);

      const loadUser = async s => {
        const { data: prof } = await supabaseClient.from('profiles').select('role').eq('id', s.user.id).single();
        if (prof && prof.role === 'super_admin') {
          setSession(s);
          setProfile(prof);
        }
        setLoading(false);
      };

      const handleLogout = () => supabaseClient.auth.signOut().then(() => setSession(null));

      if (loading) return <div className="flex h-screen items-center justify-center">Loading Admin Console...</div>;
      if (!session) return <LoginPage onLogin={s => setSession(s)} />;

      return (
        <AppContext.Provider value={{ session, view, setView }}>
          <Layout onLogout={handleLogout}>
            {view === 'dashboard' && <Dashboard />}
            {view === 'tenants' && <TenantManagement />}
            {view === 'users' && <UserConfiguration />}
            {view === 'subscription' && <SubscriptionConfig />}
            {view === 'reports' && <ReportsAndLogs />}
            {view === 'settings' && <div className="text-center py-12 text-gray-500">System Settings module coming soon.</div>}
          </Layout>
        </AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
