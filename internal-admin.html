<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Gates SaaS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: white; }
    .card { @apply bg-slate-800 rounded-xl border border-slate-700 p-5; }
    .btn { @apply px-4 py-2 rounded-lg font-medium transition disabled:opacity-50 text-sm; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-500; }
    .btn-outline { @apply border border-slate-600 text-slate-300 hover:bg-slate-700; }
    input, select { @apply w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white text-sm focus:outline-none focus:border-blue-500; }
    label { @apply block text-xs font-semibold text-slate-400 mb-1 uppercase; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://eybscqqkusgbfmvvjbbb.supabase.co'; // GANTI URL
    const SUPABASE_ANON_KEY = 'sb_publishable_fAvutkgsk5UAXnwIz5RSPw_Z2Dk43EP'; // GANTI KEY
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, createContext, useContext } = React;
    const AppContext = createContext();

    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const handleLogin = async e => {
        e.preventDefault(); setLoading(true);
        const { data: auth, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if(error) alert(error.message);
        else if(auth.user.app_metadata?.role !== 'super_admin') alert('Access Denied: Super Admin only.');
        else onLogin(auth);
        setLoading(false);
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <form onSubmit={handleLogin} className="card w-full max-w-md p-8">
            <h1 className="text-2xl font-bold text-center mb-6 text-blue-400">👑 SaaS Admin</h1>
            <div className="space-y-4">
              <div><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
              <div><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
              <button type="submit" disabled={loading} className="btn btn-primary w-full">{loading?'Checking...':'Login'}</button>
            </div>
          </form>
        </div>
      );
    }

    function Dashboard({ onLogout }) {
      const { user } = useContext(AppContext);
      const [tenants, setTenants] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        supabaseClient.from('tenants').select('*').order('created_at', { ascending: false }).then(({ data }) => { setTenants(data || []); setLoading(false); });
      }, []);
      return (
        <div className="min-h-screen p-6 max-w-7xl mx-auto">
          <header className="flex justify-between items-center mb-8"><h1 className="text-2xl font-bold">Platform Dashboard</h1><button onClick={onLogout} className="btn btn-outline">Logout</button></header>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="card"><p className="text-slate-400 text-sm">Total Tenants</p><p className="text-3xl font-bold text-blue-400">{tenants.length}</p></div>
            <div className="card"><p className="text-slate-400 text-sm">Active Subscriptions</p><p className="text-3xl font-bold text-green-400">{tenants.filter(t=>t.plan!=='starter').length}</p></div>
            <div className="card"><p className="text-slate-400 text-sm">System Status</p><p className="text-3xl font-bold text-emerald-400">Online</p></div>
          </div>
          <div className="card">
            <h2 className="text-xl font-bold mb-4">Tenant List</h2>
            {loading ? <p>Loading...</p> : (
              <table className="w-full text-left text-sm text-slate-300">
                <thead className="border-b border-slate-700"><tr><th className="p-3">Name</th><th className="p-3">Plan</th><th className="p-3">Created</th><th className="p-3">Action</th></tr></thead>
                <tbody>{tenants.map(t => (
                  <tr key={t.id} className="border-b border-slate-700/50 hover:bg-slate-700/30">
                    <td className="p-3 font-medium text-white">{t.name}</td>
                    <td className="p-3"><span className="bg-blue-900 text-blue-200 px-2 py-1 rounded text-xs">{t.plan}</span></td>
                    <td className="p-3">{new Date(t.created_at).toLocaleDateString()}</td>
                    <td className="p-3"><button className="text-blue-400 hover:underline text-xs">Manage</button></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        supabaseClient.auth.getSession().then(({data:{session:s}}) => {
          if(s?.user?.app_metadata?.role === 'super_admin') setSession(s);
          setLoading(false);
        });
      }, []);
      if(loading) return <div className="flex h-screen items-center justify-center">Loading Admin...</div>;
      return (
        <AppContext.Provider value={{ user: session?.user }}>
          {session ? <Dashboard onLogout={() => supabaseClient.auth.signOut().then(() => setSession(null))} /> : <LoginPage onLogin={s => setSession(s)} />}
        </AppContext.Provider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
