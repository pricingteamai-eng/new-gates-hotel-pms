<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Gates Hotel PMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #F2F2F7; }
    .card { @apply bg-white rounded-xl shadow-sm border border-gray-100 p-5 transition hover:shadow-md; }
    .btn { @apply px-4 py-2.5 rounded-lg font-medium transition flex items-center justify-center gap-2 disabled:opacity-50 text-sm; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
    .btn-success { @apply bg-green-600 text-white hover:bg-green-700; }
    .btn-outline { @apply border border-gray-300 text-gray-700 hover:bg-gray-50; }
    .btn-danger { @apply bg-red-50 text-red-600 hover:bg-red-100; }
    .badge { @apply px-2 py-1 rounded-full text-xs font-semibold; }
    .badge-green { @apply bg-green-100 text-green-800; }
    .badge-red { @apply bg-red-100 text-red-800; }
    .badge-yellow { @apply bg-yellow-100 text-yellow-800; }
    .badge-blue { @apply bg-blue-100 text-blue-800; }
    input, select, textarea { @apply w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500; }
    label { @apply block text-xs font-semibold text-gray-500 mb-1 uppercase; }
    .toast { @apply fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg text-white z-50 animate-fade-in text-sm font-medium; }
    @keyframes fade-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .animate-fade-in { animation: fade-in 0.3s ease-out; }
  </style>
</head>
<body class="min-h-screen text-gray-800">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://eybscqqkusgbfmvvjbbb.supabase.co'; // GANTI URL ANDA
    const SUPABASE_ANON_KEY = 'sb_publishable_fAvutkgsk5UAXnwIz5RSPw_Z2Dk43EP'; // GANTI KEY ANDA
    const DEMO_TENANT_ID = '00000000-0000-0000-0000-000000000001';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useMemo, createContext, useContext } = React;

    const AppContext = createContext();
    const formatCurrency = v => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v || 0);
    const formatDate = d => d ? new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';

    function Toast({ msg, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return <div className={`toast ${type==='error'?'bg-red-600':'bg-green-600'}`}>{msg}</div>;
    }

    // 🔐 LOGIN
    function LoginPage({ onLogin }) {
      const [hotels, setHotels] = useState([]);
      const [hotel, setHotel] = useState('');
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        supabaseClient.from('tenants').select('id, name').eq('is_active', true).then(({ data }) => setHotels(data || []));
      }, []);

      const handleSubmit = async e => {
        e.preventDefault();
        if(!hotel) return setError('Pilih hotel');
        setLoading(true); setError('');
        try {
          const { data: auth, error: authErr } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
          if(authErr) throw authErr;
          const { data: prof, error: profErr } = await supabaseClient.from('profiles').select('tenant_id, role').eq('id', auth.user.id).single();
          if(profErr) throw new Error('Profile tidak ditemukan');
          if(prof.role !== 'super_admin' && prof.tenant_id !== hotel) throw new Error('Tidak punya akses ke hotel ini');
          onLogin(auth, prof, hotel);
        } catch(err) { setError(err.message); }
        finally { setLoading(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-indigo-100">
          <div className="card w-full max-w-md p-8">
            <h1 className="text-3xl font-bold text-center text-blue-600 mb-2">🏨 New Gates</h1>
            <p className="text-center text-gray-500 mb-6">Hotel Management System</p>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">{error}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div><label>Pilih Hotel</label><select value={hotel} onChange={e=>setHotel(e.target.value)} required>{hotels.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}</select></div>
              <div><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
              <div><label>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} required /></div>
              <button type="submit" disabled={loading} className="btn btn-primary w-full">{loading?'Loading...':'Masuk'}</button>
            </form>
          </div>
        </div>
      );
    }

    // 📊 DASHBOARD
    function Dashboard({ showToast }) {
      const { tenant } = useContext(AppContext);
      const [stats, setStats] = useState({ total:0, occ:0, rev:0 });
      const [bookings, setBookings] = useState([]);
      
      useEffect(() => {
        (async () => {
          const { data: rooms } = await supabaseClient.from('rooms').select('status').eq('tenant_id', tenant.id);
          const occ = rooms?.filter(r=>r.status==='occupied').length || 0;
          const today = new Date().toISOString().split('T')[0];
          const { data: res } = await supabaseClient.from('reservations').select('guest_name, total_amount, check_in, status').eq('tenant_id', tenant.id).gte('check_in', today).limit(5);
          setStats({ total: rooms?.length||0, occ, rev: res?.reduce((a,b)=>a+(b.total_amount||0),0)||0 });
          setBookings(res||[]);
        })();
      }, []);

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="card flex items-center gap-4"><div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl">🛏️</div><div><p className="text-xs font-semibold text-gray-500 uppercase">Total Kamar</p><p className="text-2xl font-bold">{stats.total}</p></div></div>
            <div className="card flex items-center gap-4"><div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl">📊</div><div><p className="text-xs font-semibold text-gray-500 uppercase">Occupancy</p><p className="text-2xl font-bold">{stats.total?Math.round(occ/stats.total*100):0}%</p></div></div>
            <div className="card flex items-center gap-4"><div className="w-12 h-12 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-xl">💰</div><div><p className="text-xs font-semibold text-gray-500 uppercase">Revenue Today</p><p className="text-xl font-bold">{formatCurrency(stats.rev)}</p></div></div>
          </div>
          <div className="card"><h3 className="font-bold mb-4">Recent Bookings</h3><div className="space-y-3">{bookings.map((b,i)=><div key={i} className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-medium">{b.guest_name}</span><span className={`badge ${b.status==='checked_in'?'badge-green':'badge-blue'}`}>{b.status}</span></div>)}</div></div>
          <div className="card"><h3 className="font-bold mb-4">Channel Manager Status</h3><div className="grid grid-cols-2 md:grid-cols-4 gap-4">{['Traveloka','Agoda','Booking.com','Tiket.com'].map(o=><div key={o} className="flex justify-between p-3 border rounded"><span>{o}</span><span className="w-2 h-2 rounded-full bg-green-500 mt-2"></span></div>)}</div></div>
        </div>
      );
    }

    // 📝 RESERVATION FORM
    function ReservationForm({ onSave }) {
      const { tenant } = useContext(AppContext);
      const [form, setForm] = useState({ quantity:1, room_type:'', reserve_name:'', guest_name:'', room_number:'', id_card_number:'', address_country:'Indonesia', address_province:'', address_city:'', address_postal:'', address_detail:'', birth_date:'', phone:'', email:'', adult_count:1, child_count:0, check_in:'', check_out:'', total_nights:0, eta:'', etd:'', room_rate:0, extra_bed_count:0, rate_plan:'', segment:'Leisure', deposit_amount:0, status:'confirmed', comment:'', document_url:'' });
      const [loading, setLoading] = useState(false);

      const update = (k,v) => {
        setForm(p=>({...p,[k]:v}));
        if(k==='check_in'||k==='check_out') setTimeout(()=>{
          if(form.check_in&&form.check_out) setForm(p=>({...p, total_nights: Math.max(0, (new Date(form.check_out)-new Date(form.check_in))/(1000*60*60*24))}));
        },0);
      };

      const submit = async e => {
        e.preventDefault(); setLoading(true);
        try {
          const total = form.room_rate * form.total_nights + form.deposit_amount;
          const { error } = await supabaseClient.from('reservations').insert([{...form, tenant_id: tenant.id, total_amount: total}]);
          if(error) throw error;
          showToast('Reservasi berhasil!','success'); onSave();
        } catch(err) { showToast(err.message,'error'); }
        finally { setLoading(false); }
      };

      return (
        <form onSubmit={submit} className="space-y-6">
          <div className="flex justify-between"><h2 className="text-xl font-bold">Create Reservation</h2><button type="button" onClick={onSave} className="btn btn-outline">Discard</button></div>
          <div className="card"><h3 className="font-bold text-blue-600 mb-4 border-b pb-2">1. Guest Information</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label>Guest Name *</label><input value={form.guest_name} onChange={e=>update('guest_name',e.target.value)} required /></div>
            <div><label>Reserve Name</label><input value={form.reserve_name} onChange={e=>update('reserve_name',e.target.value)} /></div>
            <div><label>ID Card</label><input value={form.id_card_number} onChange={e=>update('id_card_number',e.target.value)} /></div>
            <div><label>Phone</label><input type="tel" value={form.phone} onChange={e=>update('phone',e.target.value)} /></div>
            <div><label>Email</label><input type="email" value={form.email} onChange={e=>update('email',e.target.value)} /></div>
            <div><label>Birth Date</label><input type="date" value={form.birth_date} onChange={e=>update('birth_date',e.target.value)} /></div>
            <div><label>Country</label><input value={form.address_country} onChange={e=>update('address_country',e.target.value)} /></div>
            <div><label>Province</label><input value={form.address_province} onChange={e=>update('address_province',e.target.value)} /></div>
            <div><label>City</label><input value={form.address_city} onChange={e=>update('address_city',e.target.value)} /></div>
            <div className="md:col-span-3"><label>Detail Address</label><textarea rows="2" value={form.address_detail} onChange={e=>update('address_detail',e.target.value)}></textarea></div>
            <div><label>Adults</label><input type="number" value={form.adult_count} onChange={e=>update('adult_count',e.target.value)} /></div>
            <div><label>Children</label><input type="number" value={form.child_count} onChange={e=>update('child_count',e.target.value)} /></div>
          </div></div>
          <div className="card"><h3 className="font-bold text-blue-600 mb-4 border-b pb-2">2. Stay Details</h3><div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div><label>Check-In *</label><input type="date" value={form.check_in} onChange={e=>update('check_in',e.target.value)} required /></div>
            <div><label>Check-Out *</label><input type="date" value={form.check_out} onChange={e=>update('check_out',e.target.value)} required /></div>
            <div><label>Total Nights</label><input type="number" value={form.total_nights} readOnly className="bg-gray-100" /></div>
            <div><label>Segment</label><select value={form.segment} onChange={e=>update('segment',e.target.value)}><option>Leisure</option><option>Corporate</option><option>Group</option><option>OTA</option><option>Walk-in</option></select></div>
            <div><label>Room Type</label><select value={form.room_type} onChange={e=>update('room_type',e.target.value)}><option>Standard</option><option>Deluxe</option><option>Suite</option></select></div>
            <div><label>Room Rate</label><input type="number" value={form.room_rate} onChange={e=>update('room_rate',parseFloat(e.target.value))} /></div>
            <div><label>Rate Plan</label><select value={form.rate_plan} onChange={e=>update('rate_plan',e.target.value)}><option>Room Only</option><option>Room Breakfast</option><option>Full Board</option></select></div>
            <div><label>ETA</label><input type="time" value={form.eta} onChange={e=>update('eta',e.target.value)} /></div>
            <div className="md:col-span-2"><label>Comment</label><textarea rows="2" value={form.comment} onChange={e=>update('comment',e.target.value)}></textarea></div>
          </div></div>
          <div className="card flex justify-end gap-3"><button type="submit" disabled={loading} className="btn btn-primary px-8">{loading?'Saving...':'Save Reservation'}</button></div>
        </form>
      );
    }

    // 🧹 HOUSEKEEPING
    function Housekeeping({ showToast }) {
      const { tenant } = useContext(AppContext);
      const [rooms, setRooms] = useState([]);

      useEffect(() => {
        supabaseClient.from('rooms').select('*').eq('tenant_id', tenant.id).order('room_number').then(({data})=>setRooms(data||[]));
      }, []);

      const updateStatus = async (id, status) => {
        const { error } = await supabaseClient.from('rooms').update({ status }).eq('id', id);
        if(!error) {
          showToast('Room status updated','success');
          setRooms(p=>p.map(r=>r.id===id?{...r,status}:r));
        }
      };

      return (
        <div className="space-y-6">
          <h2 className="text-xl font-bold">Housekeeping Management</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            {rooms.map(r=>(
              <div key={r.id} className="card flex flex-col items-center text-center">
                <span className="text-2xl mb-1">🚪</span>
                <div className="font-bold">#{r.room_number}</div>
                <div className="text-xs text-gray-500 mb-3">{r.room_type_id}</div>
                <select
                  value={r.status}
                  onChange={e=>updateStatus(r.id, e.target.value)}
                  className={`text-xs p-1 rounded ${r.status==='dirty'?'bg-red-100 text-red-700':r.status==='available'?'bg-green-100 text-green-700':'bg-blue-100 text-blue-700'}`}
                >
                  <option value="available">Available</option>
                  <option value="occupied">Occupied</option>
                  <option value="dirty">Dirty</option>
                  <option value="out_of_order">Out of Order</option>
                </select>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 🍽️ F&B POS
    function POS({ showToast }) {
      const { tenant } = useContext(AppContext);
      const [articles, setArticles] = useState([]);
      const [cart, setCart] = useState([]);

      useEffect(() => {
        supabaseClient.from('articles').select('*').eq('tenant_id', tenant.id).then(({data})=>setArticles(data||[]));
      }, []);

      const addToCart = (item) => {
        setCart(p=>{
          const exists = p.find(i=>i.id===item.id);
          if(exists) return p.map(i=>i.id===item.id?{...i, qty: i.qty+1}:i);
          return [...p, {...item, qty:1}];
        });
      };

      const checkout = async () => {
        const total = cart.reduce((a,b)=>a+(b.price*b.qty),0);
        const { error } = await supabaseClient.from('sales').insert([{
          tenant_id: tenant.id,
          items: cart,
          total_amount: total
        }]);
        if(!error) {
          showToast('Order successful','success');
          setCart([]);
        }
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div className="md:col-span-2 space-y-4">
            <h2 className="text-xl font-bold">F&B POS</h2>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {articles.map(a=>(
                <button key={a.id} onClick={()=>addToCart(a)} className="card hover:border-blue-500 text-left">
                  <div className="font-bold">{a.name}</div>
                  <div className="text-blue-600 font-semibold">{formatCurrency(a.price)}</div>
                </button>
              ))}
              {articles.length===0 && <div className="col-span-full text-center py-12 text-gray-400 card">No articles found. Add some in Settings > Articles.</div>}
            </div>
          </div>
          <div className="card h-fit sticky top-8">
            <h3 className="font-bold mb-4 border-b pb-2">Order Summary</h3>
            <div className="space-y-3 mb-4 max-h-64 overflow-y-auto">
              {cart.map(i=>(
                <div key={i.id} className="flex justify-between text-sm">
                  <span>{i.name} x{i.qty}</span>
                  <span>{formatCurrency(i.price*i.qty)}</span>
                </div>
              ))}
              {cart.length===0 && <div className="text-gray-400 text-center py-4">Cart is empty</div>}
            </div>
            <div className="border-t pt-2 mb-4 flex justify-between font-bold">
              <span>Total</span>
              <span>{formatCurrency(cart.reduce((a,b)=>a+(b.price*b.qty),0))}</span>
            </div>
            <button onClick={checkout} disabled={cart.length===0} className="btn btn-primary w-full">Checkout</button>
          </div>
        </div>
      );
    }

    // 📅 RESERVATION LIST
    function ReservationList({ onNew }) {
      const { tenant } = useContext(AppContext);
      const [list, setList] = useState([]);
      const [filter, setFilter] = useState('all');
      
      useEffect(() => {
        supabaseClient.from('reservations').select('*').eq('tenant_id', tenant.id).order('check_in',{ascending:true}).then(({data})=>setList(data||[]));
      }, []);

      const filtered = filter==='all' ? list : list.filter(r=>r.status===filter);

      return (
        <div className="card overflow-hidden">
          <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 className="text-xl font-bold">Reservations</h2>
            <div className="flex gap-2">
              {['all','confirmed','checked_in','checked_out'].map(f=><button key={f} onClick={()=>setFilter(f)} className={`px-3 py-1 rounded text-xs font-medium capitalize ${filter===f?'bg-blue-600 text-white':'bg-gray-100'}`}>{f.replace('_',' ')}</button>)}
              <button onClick={onNew} className="btn btn-primary ml-auto">+ New</button>
            </div>
          </div>
          <div className="overflow-x-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-50"><tr><th className="p-3">Guest</th><th className="p-3">Check-In</th><th className="p-3">Check-Out</th><th className="p-3">Room</th><th className="p-3">Rate</th><th className="p-3">Status</th></tr></thead><tbody>{filtered.map(r=><tr key={r.id} className="border-b hover:bg-gray-50"><td className="p-3 font-medium">{r.guest_name}</td><td className="p-3">{formatDate(r.check_in)}</td><td className="p-3">{formatDate(r.check_out)}</td><td className="p-3">#{r.room_number||'-'}<br/><span className="text-xs text-gray-400">{r.room_type}</span></td><td className="p-3">{formatCurrency(r.room_rate)}</td><td className="p-3"><span className={`badge ${r.status==='checked_in'?'badge-green':r.status==='confirmed'?'badge-blue':'badge-yellow'}`}>{r.status}</span></td></tr>)}</tbody></table></div>
        </div>
      );
    }

    // ⚙️ SETTINGS MODULE
    function Settings({ showToast }) {
      const { tenant } = useContext(AppContext);
      const [tab, setTab] = useState('rooms');
      const [rooms, setRooms] = useState([]);
      const [ratePlans, setRatePlans] = useState([]);
      const [segments, setSegments] = useState([]);
      const [articles, setArticles] = useState([]);
      const [taxServices, setTaxServices] = useState([]);

      const [newRoom, setNewRoom] = useState({ room_number:'', room_type_id:'', floor_number:1, status:'available' });
      const [newRate, setNewRate] = useState({ name:'', alias:'', details:'[]' });
      const [newSegment, setNewSegment] = useState({ name:'' });
      const [newArticle, setNewArticle] = useState({ name:'', price:0, category:'F&B' });
      const [newTax, setNewTax] = useState({ name:'', percentage:0 });

      useEffect(() => {
        if (tab==='rooms') supabaseClient.from('rooms').select('*').eq('tenant_id', tenant.id).then(({data})=>setRooms(data||[]));
        if (tab==='rate_plans') supabaseClient.from('rate_plans').select('*').eq('tenant_id', tenant.id).then(({data})=>setRatePlans(data||[]));
        if (tab==='segments') supabaseClient.from('segments').select('*').eq('tenant_id', tenant.id).then(({data})=>setSegments(data||[]));
        if (tab==='articles') supabaseClient.from('articles').select('*').eq('tenant_id', tenant.id).then(({data})=>setArticles(data||[]));
        if (tab==='tax_service') supabaseClient.from('tax_services').select('*').eq('tenant_id', tenant.id).then(({data})=>setTaxServices(data||[]));
      }, [tab]);

      const addRoom = async () => {
        const { error } = await supabaseClient.from('rooms').insert([{...newRoom, tenant_id: tenant.id}]);
        if(!error) { showToast('Room added','success'); setRooms(p=>[...p, {...newRoom, id:Date.now()}]); }
      };
      const addRate = async () => {
        const { error } = await supabaseClient.from('rate_plans').insert([{...newRate, tenant_id: tenant.id}]);
        if(!error) { showToast('Rate Plan added','success'); setRatePlans(p=>[...p, {...newRate, id:Date.now()}]); }
      };
      const addSegment = async () => {
        const { error } = await supabaseClient.from('segments').insert([{...newSegment, tenant_id: tenant.id}]);
        if(!error) { showToast('Segment added','success'); setSegments(p=>[...p, {...newSegment, id:Date.now()}]); }
      };
      const addArticle = async () => {
        const { error } = await supabaseClient.from('articles').insert([{...newArticle, tenant_id: tenant.id}]);
        if(!error) { showToast('Article added','success'); setArticles(p=>[...p, {...newArticle, id:Date.now()}]); }
      };
      const addTax = async () => {
        const { error } = await supabaseClient.from('tax_services').insert([{...newTax, tenant_id: tenant.id}]);
        if(!error) { showToast('Tax/Service added','success'); setTaxServices(p=>[...p, {...newTax, id:Date.now()}]); }
      };

      return (
        <div className="space-y-6">
          <div className="flex gap-2 border-b pb-2 overflow-x-auto">
            {['rooms','rate_plans','segments','articles','tax_service'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 text-sm font-medium whitespace-nowrap capitalize ${tab===t?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>{t.replace('_',' ')}</button>)}
          </div>
          {tab==='rooms' && <div className="card"><h3 className="font-bold mb-4">Room Inventory</h3><div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <input placeholder="Room Number" value={newRoom.room_number} onChange={e=>setNewRoom(p=>({...p,room_number:e.target.value}))} />
            <select value={newRoom.room_type_id} onChange={e=>setNewRoom(p=>({...p,room_type_id:e.target.value}))}><option value="">Select Type</option><option value="Standard">Standard</option><option value="Deluxe">Deluxe</option><option value="Suite">Suite</option></select>
            <input type="number" placeholder="Floor" value={newRoom.floor_number} onChange={e=>setNewRoom(p=>({...p,floor_number:e.target.value}))} />
            <button onClick={addRoom} className="btn btn-primary">Add Room</button>
          </div><div className="grid grid-cols-2 md:grid-cols-4 gap-3">{rooms.map(r=><div key={r.id} className="p-3 border rounded"><div className="font-bold">#{r.room_number}</div><div className="text-xs text-gray-500">{r.room_type_id} • Floor {r.floor_number}</div></div>)}</div></div>}
          {tab==='rate_plans' && <div className="card"><h3 className="font-bold mb-4">Rate Plans</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input placeholder="Plan Name" value={newRate.name} onChange={e=>setNewRate(p=>({...p,name:e.target.value}))} />
            <input placeholder="Alias (e.g. RB)" value={newRate.alias} onChange={e=>setNewRate(p=>({...p,alias:e.target.value}))} />
            <button onClick={addRate} className="btn btn-primary">Add Plan</button>
          </div><div className="space-y-2">{ratePlans.map(p=><div key={p.id} className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-medium">{p.name} ({p.alias})</span><span className="text-xs text-gray-500">Active</span></div>)}</div></div>}
          {tab==='segments' && <div className="card"><h3 className="font-bold mb-4">Market Segments</h3><div className="flex gap-4 mb-4">
            <input placeholder="Segment Name" value={newSegment.name} onChange={e=>setNewSegment({name:e.target.value})} />
            <button onClick={addSegment} className="btn btn-primary">Add</button>
          </div><div className="space-y-2">{segments.map(s=><div key={s.id} className="p-3 bg-gray-50 rounded">{s.name}</div>)}</div></div>}
          {tab==='articles' && <div className="card"><h3 className="font-bold mb-4">Articles (F&B / Services)</h3><div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <input placeholder="Name" value={newArticle.name} onChange={e=>setNewArticle(p=>({...p,name:e.target.value}))} />
            <input type="number" placeholder="Price" value={newArticle.price} onChange={e=>setNewArticle(p=>({...p,price:parseFloat(e.target.value)}))} />
            <select value={newArticle.category} onChange={e=>setNewArticle(p=>({...p,category:e.target.value}))}><option>F&B</option><option>Service</option><option>Other</option></select>
            <button onClick={addArticle} className="btn btn-primary">Add</button>
          </div><div className="space-y-2">{articles.map(a=><div key={a.id} className="flex justify-between p-3 bg-gray-50 rounded"><span>{a.name} ({a.category})</span><span className="font-bold">{formatCurrency(a.price)}</span></div>)}</div></div>}
          {tab==='tax_service' && <div className="card"><h3 className="font-bold mb-4">Tax & Service</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input placeholder="Name" value={newTax.name} onChange={e=>setNewTax(p=>({...p,name:e.target.value}))} />
            <input type="number" placeholder="Percentage" value={newTax.percentage} onChange={e=>setNewTax(p=>({...p,percentage:parseFloat(e.target.value)}))} />
            <button onClick={addTax} className="btn btn-primary">Add</button>
          </div><div className="space-y-2">{taxServices.map(t=><div key={t.id} className="flex justify-between p-3 bg-gray-50 rounded"><span>{t.name}</span><span className="font-bold">{t.percentage}%</span></div>)}</div></div>}
        </div>
      );
    }

    // 🏠 LAYOUT
    function Layout({ children, onLogout }) {
      const { user, tenant, setView } = useContext(AppContext);
      const menu = [
        {id:'dashboard', label:'Dashboard', icon:'📊'},
        {id:'reservations', label:'Reservations', icon:'📅'},
        {id:'housekeeping', label:'Housekeeping', icon:'🧹'},
        {id:'pos', label:'F&B POS', icon:'🍽️'},
        {id:'settings', label:'Settings', icon:'⚙️'}
      ];
      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          <aside className="hidden md:flex flex-col w-64 bg-white border-r min-h-screen">
            <div className="p-6 border-b"><h1 className="text-xl font-bold text-blue-600">New Gates PMS</h1><p className="text-xs text-gray-400 mt-1">{tenant?.name}</p></div>
            <nav className="flex-1 p-4 space-y-2">{menu.map(m=><button key={m.id} onClick={()=>setView(m.id)} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600"><span className="text-lg">{m.icon}</span>{m.label}</button>)}</nav>
            <div className="p-4 border-t"><button onClick={onLogout} className="w-full btn btn-danger text-xs">Logout</button></div>
          </aside>
          <main className="flex-1 p-4 md:p-8 overflow-y-auto pb-20 md:pb-8">{children}</main>
          <nav className="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around p-3">{menu.slice(0,4).map(m=><button key={m.id} onClick={()=>setView(m.id)} className="flex flex-col items-center text-xs text-gray-500"><span className="text-xl mb-1">{m.icon}</span>{m.label}</button>)}</nav>
        </div>
      );
    }

    // 🚀 APP
    function App() {
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [tenant, setTenant] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('dashboard');
      const [toast, setToast] = useState(null);
      const showToast = (msg,type) => setToast({msg,type});

      useEffect(() => {
        supabaseClient.auth.getSession().then(({data:{session:s}}) => {
          if(s) loadUser(s);
          setLoading(false);
        });
        const {data:{subscription}} = supabaseClient.auth.onAuthStateChange((_,s) => s ? loadUser(s) : (setSession(null), setProfile(null), setTenant(null)));
        return () => subscription.unsubscribe();
      }, []);

      const loadUser = async s => {
        setSession(s);
        const {data:prof} = await supabaseClient.from('profiles').select('tenant_id, role').eq('id', s.user.id).single();
        if(prof) {
          setProfile(prof);
          const {data:t} = await supabaseClient.from('tenants').select('id, name').eq('id', prof.tenant_id).single();
          if(t) setTenant(t);
        }
      };

      const handleLogin = (auth, prof, hotelId) => { setSession(auth); setProfile(prof); };
      const handleLogout = () => supabaseClient.auth.signOut();

      if(loading) return <div className="flex h-screen items-center justify-center">Loading...</div>;
      if(!session) return <LoginPage onLogin={handleLogin} />;

      return (
        <AppContext.Provider value={{user:session.user, profile, tenant, setView}}>
          <Layout onLogout={handleLogout}>
            {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
            {view==='dashboard' && <Dashboard showToast={showToast} />}
            {view==='reservations' && <ReservationList onNew={()=>setView('res_form')} />}
            {view==='res_form' && <ReservationForm onSave={()=>setView('reservations')} />}
            {view==='housekeeping' && <Housekeeping showToast={showToast} />}
            {view==='pos' && <POS showToast={showToast} />}
            {view==='settings' && <Settings showToast={showToast} />}
          </Layout>
        </AppContext.Provider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
